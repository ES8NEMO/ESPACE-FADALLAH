<!DOCTYPE html>
<html lang="ar" dir="rtl">

            padding: 0;

        body {

            color: #1e2a1f;

        body[dir="ltr"] { text-align: left; }
        body[dir="rtl"] { text-align: right; }

        header {

            z-index: 1000;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #93C572 0%, #6fa44c 100%);

            background-clip: text;
            color: transparent;
        }
        .logo p { font-size: 0.75rem; color: #6c757d; margin-top: 4px; }
        .header-actions { display: flex; gap: 20px; align-items: center; }
        .icon-btn {

            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #93C572;
            transition: all 0.2s;

        }
        .cart-count {
            background: #93C572;
            color: white;
            border-radius: 30px;
            padding: 2px 6px;
            font-size: 0.7rem;
            position: absolute;
            top: -8px;
            right: -10px;
            min-width: 20px;
            text-align: center;
        }
        .lang-switch { display: flex; gap: 6px; }
        .lang-btn {
            background: transparent;
            border: 1.5px solid #93C572;
            padding: 5px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .lang-btn.active { background: #93C572; color: white; }
        .exit-btn {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .dev-toolbar {
            display: flex;
            gap: 12px;
            margin-right: 20px;
        }
        .dev-btn {
            background: #93C572;

            padding: 6px 16px;
            border-radius: 40px;

            font-weight: 600;

            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dev-btn:hover { background: #6fa44c; }
        .edit-icon {
            background: #ffc107;
            color: #1e2a1f;
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-right: 8px;
            transition: 0.2s;
        }
        .delete-icon {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .edit-icon:hover, .delete-icon:hover { opacity: 0.8; }

            background: #f9fafb;
            padding: 12px 20px;
            border-radius: 60px;
            text-align: center;
            margin-bottom: 28px;
            border-right: 5px solid #93C572;

        .status-banner.closed { background: #fff5f5; border-right-color: #e74c3c; }

        .swiper { width: 100%; border-radius: 28px; }
        .category-card {
            width: 100%;
            height: 80vh;
            min-height: 460px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
        }
        .category-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .category-card:hover .category-img { transform: scale(1.03); }
        .category-title {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 800;
            color: #93C572;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        body[dir="rtl"] .category-title { left: auto; right: 30px; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
            margin-top: 40px;
        }
        .product-card-new {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            transition: all 0.3s;
            border: 1px solid #f0f0f0;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .product-img-container {
            position: relative;
            width: 100%;
            padding-top: 100%;
            overflow: hidden;
            background: #fafafa;
        }
        .product-img-new {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-badge-status {

            top: 12px;
            right: 12px;

            font-size: 0.75rem;
            font-weight: 500;

            font-weight: 700;
            z-index: 2;

        .size-quantity-row {

            color: #93C572;

            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;

            align-items: center;
            justify-content: center;
            color: #6c757d;

            align-items: center;
            gap: 12px;

            color: white;

            display: flex;
            align-items: center;
            gap: 8px;

            right: -420px;

        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1050;
            display: none;

            position: fixed;
            top: 0;
            left: 0;

            height: 100%;
            background: rgba(0,0,0,0.5);

            justify-content: center;

            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 24px;

        .btn-3d {
            background: #93C572;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;

    </div>

            <p>الحالة: <strong id="trackStatus"></strong></p>
            <div style="margin: 20px 0; background: #f0f7ec; padding: 12px; border-radius: 28px;">

    <div class="modal" id="productFormModal">

    </div>

            burger: [
                { name_ar: "برغر كلاسيك", name_fr: "Burger Classique", name_en: "Classic Burger", price: "35", available: true, image: "https://placehold.co/400x400/D2691E/FFFFFF?text=Classic+Burger" },
                { name_ar: "برغر دجاج", name_fr: "Burger Poulet", name_en: "Chicken Burger", price: "40", available: true, image: "https://placehold.co/400x400/F4A460/FFFFFF?text=Chicken+Burger" },
                { name_ar: "برغر مزدوج", name_fr: "Double Burger", name_en: "Double Burger", price: "55", available: true, image: "https://placehold.co/400x400/CD853F/FFFFFF?text=Double+Burger" }
            ],
            rayeb: [], salade: [], pizza: [], tacos: [], tacos_fr: [], mokataa: [], panini: [], plats: [], frites: [], shakes: [], ma9ila: [], sandwich: [], tacos_geant: []
        };

        let currentLang = 'ar';
        let cart = [];
        let orders = [];
        let restaurantOpen = true;
        let deliveryAvailable = true;
        let currentCategoryId = null;
        let categorySwiper = null;
        let isDevMode = false;

        function t(obj) {
            if (!obj) return "";
            if (currentLang === 'ar') return obj.name_ar;
            if (currentLang === 'fr') return obj.name_fr;
            return obj.name_en;
        }

        async function saveToCloud() {
            const payload = { categories, products: productsData, sizes, restaurantOpen, deliveryAvailable };
            try {
                await fetch(BASE_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY }, body: JSON.stringify(payload) });
                alert("✅ تم حفظ التغييرات بنجاح");
            } catch(e) { console.warn(e); alert("❌ فشل الحفظ، تحقق من الاتصال"); }
        }

        async function loadFromCloud() {
            try {
                const res = await fetch(BASE_URL, { headers: { 'X-Master-Key': API_KEY } });
                const data = await res.json();
                if (data.record) {
                    if (data.record.categories) categories = data.record.categories;
                    if (data.record.products) productsData = data.record.products;
                    if (data.record.sizes) sizes = data.record.sizes;
                    if (typeof data.record.restaurantOpen !== 'undefined') restaurantOpen = data.record.restaurantOpen;
                    if (typeof data.record.deliveryAvailable !== 'undefined') deliveryAvailable = data.record.deliveryAvailable;
                }
            } catch(e) { console.warn(e); }
        }

        function renderCategories() {
            const wrapper = document.getElementById('categoriesWrapper');
            wrapper.innerHTML = '';
            categories.forEach((cat, idx) => {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                slide.innerHTML = `
                    <div class="category-card" data-category="${cat.id}" data-cat-idx="${idx}">
                        <img class="category-img" src="${cat.image}" alt="${t(cat)}" loading="lazy">
                        <div class="category-title">
                            ${t(cat)}
                            ${isDevMode ? `<button class="edit-icon edit-category" data-idx="${idx}"><i class="fas fa-pencil-alt"></i></button>` : ''}
                        </div>
                    </div>
                `;
                wrapper.appendChild(slide);
            });
            if (categorySwiper) categorySwiper.destroy(true, true);
            categorySwiper = new Swiper('.categorySwiper', {
                slidesPerView: 1,
                spaceBetween: 0,
                loop: true,
                autoplay: { delay: 1200, disableOnInteraction: false },
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
                speed: 600
            });
            document.querySelectorAll('.category-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.edit-category')) return;
                    const categoryId = card.getAttribute('data-category');
                    if (categoryId) showCategoryProducts(categoryId);
                });
            });
            if (isDevMode) {
                document.querySelectorAll('.edit-category').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = btn.getAttribute('data-idx');
                        openEditCategoryModal(idx);
                    });
                });
            }
        }

        function openEditCategoryModal(idx) {
            const cat = categories[idx];
            const newNameAr = prompt("الاسم بالعربية:", cat.name_ar);
            if (newNameAr !== null) cat.name_ar = newNameAr;
            const newNameFr = prompt("الاسم بالفرنسية:", cat.name_fr);
            if (newNameFr !== null) cat.name_fr = newNameFr;
            const newNameEn = prompt("الاسم بالإنجليزية:", cat.name_en);
            if (newNameEn !== null) cat.name_en = newNameEn;
            const newImage = prompt("رابط الصورة:", cat.image);
            if (newImage !== null) cat.image = newImage;
            renderCategories();
            if (currentCategoryId && document.getElementById('categoryProductsPage').style.display === 'block') {
                showCategoryProducts(currentCategoryId);
            }
        }

        function showCategoryProducts(categoryId) {
            currentCategoryId = categoryId;
            const category = categories.find(c => c.id === categoryId);
            if (!category) return;
            document.getElementById('categoryPageTitle').innerHTML = t(category);
            const addBtnContainer = document.getElementById('addProductBtnContainer');
            if (isDevMode) {
                addBtnContainer.innerHTML = `<button class="add-product-btn" id="addNewProductBtn"><i class="fas fa-plus"></i> إضافة منتج</button>`;
                document.getElementById('addNewProductBtn').onclick = () => openProductForm(null);
            } else {
                addBtnContainer.innerHTML = '';
            }
            const productList = productsData[categoryId] || [];
            const grid = document.getElementById('productsGridNew');
            grid.innerHTML = '';
            if (productList.length === 0 && !isDevMode) {
                grid.innerHTML = '<div style="text-align:center; padding:40px;">لا توجد منتجات في هذه الفئة حالياً</div>';
            }
            productList.forEach((prod, idx) => {
                const productAvailable = prod.available && restaurantOpen;
                const card = document.createElement('div');
                card.className = 'product-card-new';
                card.setAttribute('data-product-idx', idx);
                card.setAttribute('data-category', categoryId);
                const statusText = prod.available ? (restaurantOpen ? "متوفر" : "المطعم مغلق") : "غير متوفر";
                const statusClass = (prod.available && restaurantOpen) ? "available" : "unavailable";
                card.innerHTML = `
                    <div class="product-img-container">
                        <img class="product-img-new" src="${prod.image}" alt="${t(prod)}" loading="lazy">
                        <div class="product-badge-status ${statusClass}">${statusText}</div>
                        <div class="product-name-badge">
                            ${t(prod)}
                            ${isDevMode ? `<button class="edit-icon edit-product" data-cat="${categoryId}" data-idx="${idx}"><i class="fas fa-pencil-alt"></i></button>` : ''}
                        </div>
                    </div>
                    <div class="product-details">
                        <div class="size-quantity-row">
                            <div class="size-selector">
                                <select class="size-select" data-idx="${idx}" data-cat="${categoryId}">
                                    ${sizes.map(size => `<option value="${size.id}" data-extra="${size.priceExtra}">${t(size)} +${size.priceExtra} MAD</option>`).join('')}
                                </select>
                            </div>
                            <div class="quantity-control-new">
                                <button class="qty-minus" data-idx="${idx}" data-cat="${categoryId}">-</button>
                                <span class="qty-value" id="qty-${categoryId}-${idx}">1</span>
                                <button class="qty-plus" data-idx="${idx}" data-cat="${categoryId}">+</button>
                            </div>
                        </div>
                        <div class="order-price-row">
                            <button class="order-btn add-to-cart-new" data-idx="${idx}" data-cat="${categoryId}">
                                <i class="fas fa-shopping-cart"></i> طلب
                            </button>
                            <div class="product-price-new" id="price-${categoryId}-${idx}">
                                ${prod.price} MAD
                                ${isDevMode ? `<button class="delete-icon delete-product" data-cat="${categoryId}" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                if (!productAvailable && !isDevMode) {
                    const overlay = document.createElement('div');
                    overlay.className = 'product-unavailable-overlay';
                    overlay.innerText = prod.available ? "المطعم مغلق حالياً" : "غير متوفر";
                    card.appendChild(overlay);
                }
                grid.appendChild(card);
                
                const qtySpan = document.getElementById(`qty-${categoryId}-${idx}`);
                const priceSpan = document.getElementById(`price-${categoryId}-${idx}`);
                const sizeSelect = card.querySelector('.size-select');
                const updatePriceDisplay = () => {
                    const basePrice = parseFloat(prod.price) || 0;
                    const selectedOption = sizeSelect.options[sizeSelect.selectedIndex];
                    const extra = parseFloat(selectedOption?.getAttribute('data-extra')) || 0;
                    const qty = parseInt(qtySpan.innerText);
                    const total = (basePrice + extra) * qty;
                    priceSpan.innerHTML = `${total} MAD ${isDevMode ? `<button class="delete-icon delete-product" data-cat="${categoryId}" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button>` : ''}`;
                };
                card.querySelector('.qty-minus').addEventListener('click', () => {
                    let qty = parseInt(qtySpan.innerText);
                    if (qty > 1) qtySpan.innerText = qty - 1;
                    updatePriceDisplay();
                });
                card.querySelector('.qty-plus').addEventListener('click', () => {
                    let qty = parseInt(qtySpan.innerText);
                    qtySpan.innerText = qty + 1;
                    updatePriceDisplay();
                });
                sizeSelect.addEventListener('change', updatePriceDisplay);
                updatePriceDisplay();
                const addBtn = card.querySelector('.add-to-cart-new');
                addBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!restaurantOpen) { alert("المطعم مغلق حالياً"); return; }
                    if (!prod.available) { alert("هذا المنتج غير متوفر"); return; }
                    const qty = parseInt(qtySpan.innerText);
                    const selectedOption = sizeSelect.options[sizeSelect.selectedIndex];
                    const sizeId = selectedOption.value;
                    const selectedSize = sizes.find(s => s.id === sizeId);
                    addToCartWithDetails(prod, qty, selectedSize, "");
                });
            });
            if (isDevMode) {
                document.querySelectorAll('.edit-product').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const catId = btn.getAttribute('data-cat');
                        const idx = btn.getAttribute('data-idx');
                        openProductForm({ catId, idx });
                    });
                });
                document.querySelectorAll('.delete-product').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const catId = btn.getAttribute('data-cat');
                        const idx = btn.getAttribute('data-idx');
                        if (confirm("هل أنت متأكد من حذف هذا المنتج؟")) {
                            productsData[catId].splice(idx, 1);
                            showCategoryProducts(catId);
                        }
                    });
                });
            }
            document.getElementById('customerView').style.display = 'none';
            document.getElementById('categoryProductsPage').style.display = 'block';
            document.getElementById('kitchenView').style.display = 'none';
        }

        function openProductForm(editData) {
            const modal = document.getElementById('productFormModal');
            const title = document.getElementById('productFormTitle');
            if (editData) {
                const prod = productsData[editData.catId][editData.idx];
                document.getElementById('prodNameAr').value = prod.name_ar;
                document.getElementById('prodNameFr').value = prod.name_fr;
                document.getElementById('prodNameEn').value = prod.name_en;
                document.getElementById('prodPrice').value = prod.price;
                document.getElementById('prodImage').value = prod.image;
                document.getElementById('prodAvailable').checked = prod.available;
                title.innerText = "تعديل المنتج";
                modal.setAttribute('data-edit-cat', editData.catId);
                modal.setAttribute('data-edit-idx', editData.idx);
            } else {
                document.getElementById('prodNameAr').value = '';
                document.getElementById('prodNameFr').value = '';
                document.getElementById('prodNameEn').value = '';
                document.getElementById('prodPrice').value = '';
                document.getElementById('prodImage').value = '';
                document.getElementById('prodAvailable').checked = true;
                title.innerText = "إضافة منتج جديد";
                modal.removeAttribute('data-edit-cat');
                modal.removeAttribute('data-edit-idx');
            }
            modal.style.display = 'flex';
        }

        document.getElementById('saveProductBtn').onclick = () => {
            const modal = document.getElementById('productFormModal');
            const catId = currentCategoryId;
            if (!catId) return;
            const newProduct = {
                name_ar: document.getElementById('prodNameAr').value,
                name_fr: document.getElementById('prodNameFr').value,
                name_en: document.getElementById('prodNameEn').value,
                price: document.getElementById('prodPrice').value,
                image: document.getElementById('prodImage').value,
                available: document.getElementById('prodAvailable').checked
            };
            if (modal.hasAttribute('data-edit-cat')) {
                const editCat = modal.getAttribute('data-edit-cat');
                const editIdx = parseInt(modal.getAttribute('data-edit-idx'));
                if (editCat === catId) {
                    productsData[catId][editIdx] = newProduct;
                } else {
                    productsData[editCat][editIdx] = newProduct;
                }
            } else {
                if (!productsData[catId]) productsData[catId] = [];
                productsData[catId].push(newProduct);
            }
            modal.style.display = 'none';
            showCategoryProducts(catId);
        };
        document.getElementById('closeProductForm').onclick = () => document.getElementById('productFormModal').style.display = 'none';

        function openManageSizes() {
            const modal = document.getElementById('manageSizesModal');
            const container = document.getElementById('sizesList');
            function renderSizesList() {
                container.innerHTML = '';
                sizes.forEach((size, idx) => {
                    container.innerHTML += `
                        <div style="margin-bottom:12px; border:1px solid #ddd; padding:10px; border-radius:20px;">
                            <div>الاسم (عربي): <input type="text" value="${size.name_ar}" class="size-name-ar-${idx}" style="width:100px;"></div>
                            <div>الاسم (فرنسي): <input type="text" value="${size.name_fr}" class="size-name-fr-${idx}" style="width:100px;"></div>
                            <div>الاسم (إنجليزي): <input type="text" value="${size.name_en}" class="size-name-en-${idx}" style="width:100px;"></div>
                            <div>السعر الإضافي: <input type="number" value="${size.priceExtra}" class="size-extra-${idx}" style="width:80px;"> MAD</div>
                            <button class="delete-size-btn" data-idx="${idx}">حذف</button>
                        </div>
                    `;
                });
                for (let i = 0; i < sizes.length; i++) {
                    const arInput = document.querySelector(`.size-name-ar-${i}`);
                    const frInput = document.querySelector(`.size-name-fr-${i}`);
                    const enInput = document.querySelector(`.size-name-en-${i}`);
                    const extraInput = document.querySelector(`.size-extra-${i}`);
                    if (arInput) arInput.onchange = () => { sizes[i].name_ar = arInput.value; };
                    if (frInput) frInput.onchange = () => { sizes[i].name_fr = frInput.value; };
                    if (enInput) enInput.onchange = () => { sizes[i].name_en = enInput.value; };
                    if (extraInput) extraInput.onchange = () => { sizes[i].priceExtra = parseFloat(extraInput.value) || 0; };
                }
                document.querySelectorAll('.delete-size-btn').forEach(btn => {
                    btn.onclick = () => {
                        const idx = parseInt(btn.getAttribute('data-idx'));
                        sizes.splice(idx, 1);
                        renderSizesList();
                    };
                });
            }
            renderSizesList();
            document.getElementById('addNewSizeBtn').onclick = () => {
                sizes.push({ id: "new" + Date.now(), name_ar: "جديد", name_fr: "Nouveau", name_en: "New", priceExtra: 0 });
                renderSizesList();
            };
            modal.style.display = 'flex';
        }
        document.getElementById('closeSizesModal').onclick = () => document.getElementById('manageSizesModal').style.display = 'none';

        function addToCartWithDetails(product, quantity, selectedSize, special) {
            let finalPrice = parseFloat(product.price) || 0;
            if (selectedSize) finalPrice += selectedSize.priceExtra;
            const cartItem = {
                ...product,
                quantity: quantity,
                size: selectedSize ? { ...selectedSize } : null,
                specialRequest: special,
                finalPrice: finalPrice,
                totalPrice: finalPrice * quantity
            };
            cart.push(cartItem);
            updateCartUI();
            alert(`تمت إضافة ${quantity} × ${t(product)} إلى السلة`);
        }

        function updateCartUI() {
            const cartDiv = document.getElementById('cartItems');
            const totalSpan = document.getElementById('cartTotal');
            let total = 0;
            cartDiv.innerHTML = '';
            cart.forEach((item, idx) => {
                const itemTotal = item.finalPrice * item.quantity;
                total += itemTotal;
                cartDiv.innerHTML += `
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid #eee; padding:8px 0;">
                        <div>
                            <strong>${t(item)}</strong> x ${item.quantity}<br>
                            ${item.size ? t(item.size) : ''} ${item.specialRequest ? `<br><small>${item.specialRequest}</small>` : ''}
                        </div>
                        <div>${itemTotal} MAD</div>
                        <button class="remove-item" data-idx="${idx}" style="background:#e74c3c; color:white; border:none; border-radius:20px; padding:4px 10px;">✖</button>
                    </div>
                `;
            });
            totalSpan.innerText = `المجموع: ${total} MAD`;
            const cartCountSpan = document.getElementById('cartCount');
            if (cartCountSpan) cartCountSpan.innerText = cart.length;
            document.querySelectorAll('.remove-item').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = btn.getAttribute('data-idx');
                    cart.splice(idx, 1);
                    updateCartUI();
                });
            });
        }

        function updateStatusBanner() {
            const banner = document.getElementById('statusBanner');
            if (!restaurantOpen) banner.innerHTML = '<div class="status-banner closed">⛔ المطعم مغلق حالياً</div>';
            else banner.innerHTML = '<div class="status-banner">✅ المطعم مفتوح – نرحب بكم</div>';
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
            renderCategories();
            if (currentCategoryId && document.getElementById('categoryProductsPage').style.display === 'block') {
                showCategoryProducts(currentCategoryId);
            }
        }

        function showCustomerView() {
            isDevMode = false;
            document.getElementById('customerView').style.display = 'block';
            document.getElementById('categoryProductsPage').style.display = 'none';
            document.getElementById('kitchenView').style.display = 'none';
            const headerActions = document.getElementById('headerActions');
            headerActions.innerHTML = `
                <div class="lang-switch">
                    <button class="lang-btn" data-lang="ar">عربي</button>
                    <button class="lang-btn" data-lang="fr">FR</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <button class="icon-btn" id="cartBtn"><i class="fas fa-shopping-cart"></i><span id="cartCount" class="cart-count">0</span></button>
                <button class="icon-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
            `;
            attachCustomerEvents();
            renderCategories();
            updateStatusBanner();
        }

        function showDevView() {
            isDevMode = true;
            document.getElementById('customerView').style.display = 'block';
            document.getElementById('categoryProductsPage').style.display = 'none';
            document.getElementById('kitchenView').style.display = 'none';
            const headerActions = document.getElementById('headerActions');
            headerActions.innerHTML = `
                <div class="lang-switch">
                    <button class="lang-btn" data-lang="ar">عربي</button>
                    <button class="lang-btn" data-lang="fr">FR</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <button class="icon-btn" id="cartBtn"><i class="fas fa-shopping-cart"></i><span id="cartCount" class="cart-count">0</span></button>
                <div class="dev-toolbar">
                    <button class="dev-btn" id="saveDevChangesBtn"><i class="fas fa-save"></i> حفظ التغييرات</button>
                    <button class="dev-btn" id="manageSizesBtn"><i class="fas fa-ruler"></i> إدارة الأحجام</button>
                    <button class="dev-btn" id="exitDevModeBtn"><i class="fas fa-sign-out-alt"></i> الخروج من وضع المطور</button>
                </div>
            `;
            attachCustomerEvents();
            renderCategories();
            updateStatusBanner();
            document.getElementById('saveDevChangesBtn').onclick = () => saveToCloud();
            document.getElementById('manageSizesBtn').onclick = () => openManageSizes();
            document.getElementById('exitDevModeBtn').onclick = () => {
                if (confirm("هل تريد الخروج من وضع المطور؟")) {
                    window.location.hash = 'customer';
                    alert("👋 تم الخروج من وضع المطور");
                }
            };
        }

        function showKitchenView() {
            isDevMode = false;
            document.getElementById('customerView').style.display = 'none';
            document.getElementById('categoryProductsPage').style.display = 'none';
            document.getElementById('kitchenView').style.display = 'block';
            const headerActions = document.getElementById('headerActions');
            headerActions.innerHTML = `<button class="exit-btn" id="exitKitchenBtn">← العودة للرئيسية</button>`;
            document.getElementById('exitKitchenBtn').onclick = () => { window.location.hash = 'customer'; };
            renderKitchenPanel();
        }

        function renderKitchenPanel() {
            const container = document.getElementById('kitchenPanelContent');
            container.innerHTML = `<div><h2>🍽️ لوحة المطبخ</h2><div id="kitchenOrdersList"></div></div>`;
            const ordersDiv = document.getElementById('kitchenOrdersList');
            ordersDiv.innerHTML = '';
            orders.forEach(order => {
                ordersDiv.innerHTML += `<div style="border:1px solid #ddd; margin-bottom:12px; padding:12px; border-radius:20px;">
                    <strong>طلب #${order.id}</strong> - ${order.customer.name} - الحالة: ${order.status}<br>
                    <button class="update-status" data-id="${order.id}" data-status="preparing">قيد التجهيز</button>
                    <button class="update-status" data-id="${order.id}" data-status="ready">جاهز</button>
                </div>`;
            });
            document.querySelectorAll('.update-status').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    const newStatus = btn.getAttribute('data-status');
                    const order = orders.find(o => o.id == id);
                    if (order) order.status = newStatus;
                    localStorage.setItem('orders', JSON.stringify(orders));
                    renderKitchenPanel();
                };
            });
        }

        function checkAuth(role, callback) {
            const password = role === 'dev' ? DEV_PASSWORD : KITCHEN_PASSWORD;
            const input = prompt(`أدخل كلمة المرور للوصول إلى ${role === 'dev' ? 'لوحة المطور' : 'لوحة المطبخ'}:`);
            if (input === password) callback();
            else { alert('كلمة المرور غير صحيحة'); window.location.hash = 'customer'; }
        }

        function handleRoute() {
            const hash = window.location.hash.substring(1) || 'customer';
            if (hash === 'customer') showCustomerView();
            else if (hash === 'dev') checkAuth('dev', () => showDevView());
            else if (hash === 'kitchen') checkAuth('kitchen', () => showKitchenView());
            else window.location.hash = 'customer';
        }

        function attachCustomerEvents() {
            const cartBtn = document.getElementById('cartBtn');
            if (cartBtn) cartBtn.onclick = () => {
                document.getElementById('cartDrawer').classList.add('open');
                document.getElementById('cartOverlay').style.display = 'block';
            };
            document.getElementById('cartOverlay').onclick = () => {
                document.getElementById('cartDrawer').classList.remove('open');
                document.getElementById('cartOverlay').style.display = 'none';
            };
            const settingsBtn = document.getElementById('settingsBtn');
            if (settingsBtn) settingsBtn.onclick = () => { window.location.hash = 'dev'; };
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.onclick = () => setLanguage(btn.getAttribute('data-lang'));
            });
            document.getElementById('checkoutBtn').onclick = () => {
                if (cart.length === 0) return alert("السلة فارغة");
                if (!restaurantOpen) return alert("المطعم مغلق حالياً");
                document.getElementById('checkoutModal').style.display = 'flex';
            };
            document.getElementById('checkoutForm').onsubmit = (e) => {
                e.preventDefault();
                const name = document.getElementById('customerName').value;
                const whatsapp = document.getElementById('customerWhatsapp').value;
                const method = document.getElementById('deliveryMethod').value;
                const address = document.getElementById('customerAddress').value;
                const notes = document.getElementById('orderNotes').value;
                const orderId = Date.now();
                const order = {
                    id: orderId,
                    customer: { name, whatsapp, address: method === 'delivery' ? address : null },
                    items: [...cart],
                    total: cart.reduce((s, i) => s + (i.finalPrice * i.quantity), 0),
                    status: 'received',
                    method,
                    notes,
                    timestamp: new Date().toISOString()
                };
                orders.push(order);
                localStorage.setItem('orders', JSON.stringify(orders));
                cart = [];
                updateCartUI();
                document.getElementById('checkoutModal').style.display = 'none';
                document.getElementById('trackOrderId').innerText = orderId;
                document.getElementById('trackStatus').innerText = 'تم الاستلام';
                document.getElementById('trackingModal').style.display = 'flex';
            };
            document.getElementById('closeTracking').onclick = () => document.getElementById('trackingModal').style.display = 'none';
            document.getElementById('deliveryMethod').onchange = (e) => {
                document.getElementById('addressField').style.display = (e.target.value === 'delivery' && deliveryAvailable) ? 'block' : 'none';
            };
            document.querySelectorAll('.footer-item').forEach(item => {
                item.onclick = () => {
                    const action = item.getAttribute('data-action');
                    if (action === 'phone') window.location.href = 'tel:+212523292425';
                    else if (action === 'whatsapp') window.open('https://wa.me/212662728799', '_blank');
                    else if (action === 'facebook') window.open('https://www.facebook.com/share/17gvTZEpeG/', '_blank');
                    else if (action === 'location') window.open('https://maps.app.goo.gl/BQqxtArbwskyQouGA?g_st=aw', '_blank');
                };
            });
        }

        document.getElementById('closeProductsPageBtn').onclick = () => {
            document.getElementById('categoryProductsPage').style.display = 'none';
            document.getElementById('customerView').style.display = 'block';
            currentCategoryId = null;
            if (categorySwiper) categorySwiper.update();
        };

        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', async () => {
            await loadFromCloud();
            handleRoute();
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 300);
            }, 100);
            if (localStorage.getItem('orders')) orders = JSON.parse(localStorage.getItem('orders'));
        });
    </script>
</body>
</html>
